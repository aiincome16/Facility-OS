<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    >

    <meta
        name="description"
        content="Facility OS – digitale Objekt-, Mitarbeiter- und Reinigungsverwaltung"
    >

    <title>Facility OS</title>

    <link
        rel="stylesheet"
        href="./src/styles/base.css"
    >

    <link
        rel="stylesheet"
        href="./src/styles/objectDetail.css"
    >

    <style>
        .material-choice-section {
            display: grid;
            gap: 10px;
        }

        .material-choice-section > strong {
            color: var(--text);
            font-size: 15px;
        }

        .material-choice-grid {
            display: grid;
            grid-template-columns:
                repeat(2, minmax(0, 1fr));
            gap: 9px;
        }

        .material-choice-button {
            min-height: 58px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #08172b;
            color: var(--text);
            text-align: left;
            font-weight: 700;
            touch-action: manipulation;
            -webkit-tap-highlight-color:
                transparent;
        }

        .material-choice-button.selected {
            border-color: var(--blue);
            background:
                rgba(95, 127, 255, .24);
            box-shadow:
                0 0 0 2px var(--blue);
        }

        .material-choice-empty {
            grid-column: 1 / -1;
            padding: 14px;
            border: 1px dashed var(--border);
            border-radius: 12px;
            color: var(--soft);
            text-align: center;
        }

        @media (max-width: 380px) {
            .material-choice-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <noscript>
        Facility OS benötigt JavaScript.
    </noscript>

    <div id="app">
        <div class="loading-screen">
            Facility OS wird geladen …
        </div>
    </div>

    <script
        type="module"
        src="./src/app.js"
    ></script>
</body>
</html>
